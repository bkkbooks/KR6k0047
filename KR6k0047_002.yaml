body:
  text: 西太原寺沙門懷素集德衣篇第十一受功德衣白法律言若得新衣若檀越施衣若糞掃衣若是新衣若是故衣新物帖作淨若已浣浣已納作淨不以邪命得不以相得不激發得不經宿得不捨墮作淨即日來應法四周安緣五條作十隔若過是者亦應受應自浣染舒張碾治裁作十隔縫治應在衆僧前受如是白大德僧聽今日衆僧受功德衣若僧時到僧忍聽衆僧和合受功德衣白如是差持功德衣人法律言應問誰能持功德衣若言能者白二差持應如是作大德僧聽若僧時到僧忍聽僧差某甲比丘為僧持功德衣白如是大德僧聽僧差某甲比丘為僧持功德衣誰諸長老忍僧差某甲比丘為僧持功德衣者默然誰不忍者說僧已忍差某甲比丘為僧持功德衣竟僧忍默然故是事如是持付功德衣與持衣人法差已作白二付應如是作大德僧聽此住處僧得可分衣物現前僧應分若僧時到僧忍聽僧持此衣與某甲比丘此比丘當持此衣為僧受作功德衣於此住處持白如是大德僧聽此住處僧得可分衣物現前僧應分僧今持此衣與某甲比丘此比丘當持此衣為僧受作功德衣於此住處持誰諸長老忍僧持此衣與某甲比丘受作功德衣者默然誰不忍者說僧已忍與某甲比丘衣竟僧忍默然故是事如是持持衣僧前受法持衣比丘應起捉衣隨諸比丘手得及衣言相了處作如是言此衣衆僧當受作功德衣此衣衆僧今受作功德衣此衣衆僧已受作功德衣竟三說彼諸比丘應如是言其受者已善受此中所有功德名稱屬我持衣人應答言爾如是次第乃至下座受已得作五事一得畜長衣二離衣宿三得別衆食四得展轉食五得不囑比丘入聚落差人作功德衣法律言若得未成衣僧應白二差人作應如是差大德僧聽若僧時到僧忍聽僧差某甲比丘為僧作功德衣白如是大德僧聽僧差某甲比丘為僧作功德衣誰諸長老忍僧差某甲比丘為僧作功德衣者默然誰不忍者說僧已忍差某甲比丘為僧作功德衣竟僧忍默然故是事如是持作法如前出功德衣法彼六群比丘不出功德衣作如是意以久得五事放捨佛言不應作如是意聽冬四月竟僧應出功德衣應如是作大德僧聽今日衆僧出功德衣若僧時到僧忍聽僧今和合出功德衣白如是若不出過功德衣分齊突吉羅有八因緣捨功德衣一去二竟三不竟四失五斷望六聞七出界八共出復有二種捨功德衣持功德衣比丘出界外宿衆僧和合共出除罪篇第十二除波羅夷罪法按律懺悔有五種或有犯自心念懺悔或有犯小罪從他懺悔或有犯中罪亦從他懺悔或有犯重罪從他懺悔或有犯罪不可懺悔此不可懺罪謂波羅夷犯波羅夷罪得法有三一犯覆藏者與滅擯羯磨二犯不覆藏者與盡形學悔羯磨三學悔人重犯者與滅擯羯磨與覆藏者作滅擯法若犯波羅夷覆藏者僧與作舉作憶念與罪已應如是作大德僧聽此某甲比丘犯某波羅夷罪若僧時到僧忍聽僧今與某甲比丘某波羅夷罪滅擯羯磨不得共住不得共事白如是大德僧聽此某甲比丘犯某波羅夷罪僧今與某甲比丘某波羅夷罪滅擯羯磨不得共住不得共事誰諸長老忍僧與某甲比丘某波羅夷罪滅擯羯磨不得共住不得共事者默然誰不忍者說三說僧已忍與某甲比丘某波羅夷罪滅擯羯磨不得共住不得共事竟僧忍默然故是事如是持與不覆藏者作盡形學悔法律言若比丘未犯波羅夷終不犯若已犯都無覆藏心如法懺悔者聽僧與彼比丘波羅夷戒羯磨彼應僧中具儀作如是乞大德僧聽我某甲比丘犯某波羅夷罪都無覆藏心今從僧乞波羅夷戒願僧與我某甲比丘波羅夷戒慈愍故三說僧應如是與法大德僧聽此某甲比丘犯某波羅夷罪無覆藏心今從僧乞波羅夷戒若僧時到僧忍聽僧今與某甲比丘波羅夷戒白如是大德僧聽此某甲比丘犯某波羅夷罪無覆藏心今從僧乞波羅夷戒僧今與某甲比丘波羅夷戒誰諸長老忍僧與某甲比丘波羅夷戒者默然誰不忍者說三說僧已忍與某甲比丘波羅夷戒竟僧忍默然故是事如是持得波羅夷戒已當須盡形壽事事隨順行之隨順行法者不得授人具足戒不得與人依止不得畜沙彌若差教誡比丘尼不得受設差不應往教誡不應為僧說戒不應在僧中問答毗尼不應受僧差使作知事人不應受僧差別處斷事不應受僧差使命不應早入聚落逼暮還當親近比丘不得親近外道白衣當順從比丘法不得說餘俗語不得衆中誦律若無能誦者聽不得更犯此罪餘亦不應犯若相似若從此生若重於此者不得非僧羯磨及作羯磨者不得受清淨比丘敷坐具洗足水拭革𭕫揩摩身及禮拜迎逆問訊不應受清淨比丘捉衣鉢不得舉清淨比丘為作憶念作自言治不應證正人事不得遮清淨比丘說戒自恣不得與清淨比丘共諍與波羅夷戒比丘僧說戒及羯磨時來與不來衆僧無犯與學悔人重犯者作滅擯法諸比丘言若與波羅夷戒比丘重犯復得與波羅夷戒不佛言不應爾應滅擯與作舉等應如是作大德僧聽此某甲比丘犯某波羅夷罪無覆藏心已從僧乞波羅夷戒僧已與某甲比丘波羅夷戒此比丘於學悔中重犯某波羅夷罪若僧時到僧忍聽僧今與某甲比丘重犯某波羅夷罪滅擯羯磨不得共住不得共事白如是大德僧聽此某甲比丘犯某波羅夷罪無覆藏心已從僧乞波羅夷戒僧已與某甲比丘波羅夷戒此比丘於學悔中重犯某波羅夷罪僧今與某甲比丘重犯某波羅夷罪滅擯羯磨不得共住不得共事誰諸長老忍僧與某甲比丘重犯某波羅夷罪滅擯羯磨不得共住不得共事者默然誰不忍者說三說僧已忍與某甲比丘重犯某波羅夷罪滅擯羯磨不得共住不得共事竟僧忍默然故是事如是持除僧殘罪法羯磨有五一覆藏二若行中重犯者作覆藏本日治三摩那埵四若行中重犯者作摩那埵本日治五出罪但覆藏人有其二種一者得法重犯羯磨或四或五二者得法不重犯羯磨有三發露亦二種一者得法重犯羯磨有三二者得法不重犯羯磨有二與覆藏法律言若比丘犯僧殘罪謂犯波羅夷偷蘭遮乃至惡說覆藏者是謂不覆藏若比丘犯僧殘罪若作僧殘意覆藏應教作突吉羅懺悔已與覆藏犯波逸提乃至惡說亦如是若犯僧殘不憶犯數不憶日數者應與清淨已來覆藏若憶犯數不憶日數者亦與清淨已來覆藏若憶日數不憶犯數者應數日與覆藏疑不疑識不識亦如是彼比丘應僧中具儀作如是乞大德僧聽我某甲比丘犯某僧殘罪覆藏若干日應隨覆藏年月日長短稱之下並同此我某甲比丘犯某僧殘罪隨覆藏若干日今從僧乞覆藏羯磨願僧與我某甲比丘隨覆藏若干日羯磨慈愍故三說僧應如是與法大德僧聽此某甲比丘犯某僧殘罪覆藏若干日此某甲比丘犯某僧殘罪隨覆藏若干日今從僧乞覆藏羯磨若僧時到僧忍聽僧與某甲比丘隨覆藏若干日羯磨白如是大德僧聽此某甲比丘犯某僧殘罪覆藏若干日此某甲比丘犯某僧殘罪隨覆藏若干日今從僧乞覆藏羯磨僧與某甲比丘隨覆藏若干日羯磨誰諸長老忍僧與某甲比丘隨覆藏若干日羯磨者默然誰不忍者說三說僧已忍與某甲比丘隨覆藏若干日羯磨竟僧忍默然故是事如是持白僧行覆藏行法彼得法已即欲行者僧中具儀作如是白大德僧聽我某甲比丘犯某僧殘罪覆藏若干日我某甲比丘犯某僧殘罪隨覆藏若干日已從僧乞覆藏羯磨僧已與我某甲比丘隨覆藏若干日羯磨我今行覆藏法願僧憶持三說彼白行已具行七五之行其七五行已如上明彼至清淨比丘所一一如弟子於和上所行弟子法有八事失夜一往餘寺不白二有客比丘來不白三有緣事自出界不白四寺內徐行比丘不白五病不遣信白六二三人共一屋宿七在無比丘處住八不半月說戒時白是為八事失夜隨違一事失一夜得突吉羅罪半月說戒白法佛遣半月說戒時白彼至僧中具儀作如是白大德僧聽我某甲比丘犯某僧殘罪覆藏若干日我某甲比丘犯某僧殘罪隨覆藏若干日已從僧乞覆藏羯磨僧已與我某甲比丘隨覆藏若干日羯磨我某甲比丘已行若干日未行若干日白大德僧令知我行覆藏往餘寺等白法大同應知白停行法若大衆難集若不欲行若彼人軟弱多有羞愧應至一清淨比丘所具儀白言大德上座我某甲比丘今日捨教敕不作白行行法若欲行時應至一清淨比丘所具儀白言大德上座我某甲比丘今日隨所教敕當作作是白已如前行之行法滿已白僧停法若行法滿即應白僧應至僧中具儀白言大德僧聽我某甲比丘犯某僧殘罪覆藏若干日我某甲比丘犯某僧殘罪隨覆藏若干日已從僧乞覆藏羯磨僧已與我某甲比丘隨覆藏若干日羯磨我今行覆藏法竟願僧憶持三說與壞覆藏者本日治法彼比丘行覆時更重犯佛言聽僧為彼比丘作本日治白四羯磨此是新罪與舊罪合治應至僧中具儀作如是乞大德僧聽我某甲比丘犯某僧殘罪覆藏若干日我某甲比丘犯某僧殘罪隨覆藏若干日已從僧乞覆藏羯磨僧已與我某甲比丘隨覆藏若干日羯磨我某甲比丘行覆藏時中間更重犯某僧殘罪覆藏若干日今從僧乞前犯中間重犯某僧殘罪覆藏若干日及覆藏本日治羯磨若重犯新罪不覆藏者但與舊犯本日治乞及與者皆應知之願僧與我某甲比丘前犯中間重犯覆藏若干日及覆藏本日治羯磨慈愍故三說僧如是與大德僧聽此某甲比丘犯某僧殘罪覆藏若干日此某甲比丘犯某僧殘罪隨覆藏若干日已從僧乞覆藏羯磨僧已與某甲比丘隨覆藏若干日羯磨此某甲比丘行覆藏時中間更重犯某僧殘罪覆藏若干日今從僧乞前犯中間重犯某僧殘罪覆藏若干日及覆藏本日治羯磨若僧時到僧忍聽僧與某甲比丘前犯中間重犯覆藏若干日及覆藏本日治羯磨白如是大德僧聽此某甲比丘犯某僧殘罪覆藏若干日此某甲比丘犯某僧殘罪隨覆藏若干日已從僧乞覆藏羯磨僧已與某甲比丘隨覆藏若干日羯磨此某甲比丘行覆藏時中間更重犯某僧殘罪覆藏若干日今從僧乞前犯中間重犯某僧殘罪覆藏若干日及覆藏本日治羯磨僧與某甲比丘前犯中間重犯覆藏若干日及覆藏本日治羯磨誰諸長老忍僧與某甲比丘前犯中間重犯覆藏若干日及覆藏本日治羯磨者默然誰不忍者說三說僧已忍與某甲比丘前犯中間重犯覆藏若干日及覆藏本日治羯磨竟僧忍默然故是事如是持若更重重犯者與法准知白行等法隨事具牒之與不壞覆藏者摩那埵法但摩那埵有其二位一不壞覆法二壞覆法彼不壞覆法比丘行覆藏竟佛言聽僧與作六夜摩那埵應僧中具儀作如是乞大德僧聽我某甲比丘某犯僧殘罪覆藏若干日我某甲比丘犯某僧殘罪隨覆藏若干日已從僧乞覆藏羯磨僧已與我某甲比丘隨覆藏若干日羯磨我某甲比丘行覆藏竟今從僧乞六夜摩那埵願僧與我某甲比丘六夜摩那埵慈愍故三說僧應與法大德僧聽此某甲比丘犯某僧殘罪覆藏若干日此某甲比丘犯某僧殘罪隨覆藏若干日已從僧乞覆藏羯磨僧已與此某甲比丘隨覆藏若干日羯磨此某甲比丘行覆藏竟今從僧乞六夜摩那埵若僧時到僧忍聽僧與某甲比丘六夜摩那埵白如是大德僧聽此某甲比丘犯某僧殘罪覆藏若干日此某甲比丘犯某僧殘罪隨覆藏若干日已從僧乞覆藏羯磨僧已與某甲比丘隨覆藏若干日羯磨此某甲比丘行覆藏竟今從僧乞六夜摩那埵僧與某甲比丘六夜摩那埵誰諸長老忍僧與某甲比丘六夜摩那埵者默然誰不忍者說三說僧已忍與某甲比丘六夜摩那埵竟僧忍默然故是事如是持白僧行