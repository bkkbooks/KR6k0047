丘故畜若干衆多長衣餘隨種名事別稱之過十日犯捨墮此衣已捨與僧是中有若干衆多波逸提罪更有餘罪亦隨稱之今請大德作懺悔主願大德為我作懺悔主慈愍故一說受懺悔主白僧法其受懺主未得即許應白僧云大德僧聽某甲比丘故畜若干衆多長衣餘隨種名事別稱之過十日犯捨墮此衣已捨與僧是中有若干衆多波逸提罪餘罪隨稱今從僧乞懺悔若僧時到僧忍聽我受某甲比丘懺悔白如是作是白已始應答云可爾正懺悔法此中諸罪始終位別合有一十二位三罪第一三者謂長波逸提及根本展轉二種覆藏第二三者僧說戒時告清淨波逸提罪及二覆藏第三三者對首說戒自言清淨波逸提罪及二覆藏第四三者僧自恣時告清淨波逸提罪及二覆藏第五三者對首自恣自言清淨波逸提罪及二覆藏第六三者自身有罪為衆說戒突吉羅罪及二覆藏第七三者自身有犯不合聞戒突吉羅罪及二覆藏第八三者僧說戒時二處三問默妄突吉羅罪及二覆藏第九三者心念說戒自言清淨突吉羅罪及二覆藏第十三者心念自恣自言清淨突吉羅罪及二覆藏第十一三者自身有罪受他懺悔突吉羅罪及二覆藏第十二三者著用捨墮衣突吉羅罪及二覆藏此等諸罪有無不定懺時並須緣知具闕准文正解懺開三位第一同懺二十四覆罪謂本長提乃至第十二著用捨墮衣下覆及隨覆藏二突吉羅以此諸罪種類同故第二同懺不應說戒等七位突吉羅罪亦以此七種類同故第三同懺長等五位波逸提罪懺二十四覆藏罪法行此懺法應須具儀至誠懇惻殷重慚愧永斷相續請乞證明泛爾輕浮罪必不滅應如是作我某甲比丘故畜爾許衆多長衣餘隨種別稱之過十日犯爾許衆多尼薩耆波逸提罪既犯此罪僧說戒時告清淨犯爾許衆多波逸提罪對首說戒自言清淨犯爾許衆多波逸提罪僧自恣時告清淨犯爾許衆多波逸提罪對首自恣自言清淨犯爾許衆多波逸提罪自身有罪為衆說戒犯爾許衆多突吉羅罪自身有罪不合聞戒犯爾許衆多突吉羅罪僧說戒時二處三問犯爾許衆多默妄突吉羅罪心念說戒自言清淨犯爾許衆多突吉羅罪心念自恣自言清淨犯爾許衆多突吉羅罪自身有罪受他懺悔犯爾許衆多突吉羅罪著用犯捨墮衣犯爾許衆多突吉羅罪此等諸罪並悉識知故不發露經宿犯覆藏突吉羅罪不憶數知數者言知數經第二宿已去復犯隨展轉覆藏突吉羅罪不憶數知數言知我今懺悔不敢覆藏懺悔則安樂不懺悔不安樂憶念犯發露知而不覆藏我今自責心生厭離一說雖言責心言陳須具懺不應說戒等七位突吉羅罪具儀懇惻請證如前應如是作我某甲比丘故畜爾許衆多長衣餘隨種別稱之過十日犯爾許衆多尼薩耆波逸提罪既犯此罪為衆說戒犯爾許衆多突吉羅罪又自身有罪不合聞戒犯爾許衆多突吉羅罪僧說戒時二處三問犯爾許衆多默妄突吉羅罪心念說戒自言清淨犯爾許衆多突吉羅罪心念自恣自言清淨犯爾許衆多突吉羅罪自身有罪受他懺悔犯爾許衆多突吉羅罪著用犯捨墮衣犯爾許衆多突吉羅罪我今懺悔等同前懺長等五位波逸提罪至誠應如是作大德一心念我某甲比丘故畜爾許衆多長衣餘隨種別稱之過十日犯捨墮此衣已捨與僧是中有爾許衆多波逸提罪既犯此罪僧說戒時告清淨犯爾許衆多波逸提罪對首說戒自言清淨犯爾許衆多波逸提罪僧自恣時告清淨犯爾許衆多波逸提罪對首自恣自言清淨犯爾許衆多波逸提罪今向大德懺悔不敢覆藏懺悔則安樂不懺悔不安樂憶念犯發露知而不覆藏願大德憶我清淨戒身具足清淨布薩三說受懺者應語言自責汝心應生厭離懺者答言爾若捨墮物已用壞盡雖無財捨罪位同前亦須一一緣知具闕如上懺之還衣即座轉付法若衆僧多難集此比丘若因緣欲遠行應問言汝此衣與誰隨彼說便與應如是與大德僧聽某甲比丘故畜爾許衆多長衣餘隨種別稱之過十日犯捨墮今捨與僧若僧時到僧忍聽僧持此衣與彼某甲比丘彼某甲比丘當還此某甲比丘白如是大德僧聽某甲比丘故畜爾許衆多長衣餘隨種別稱之過十日犯捨墮今捨與僧僧持此衣與彼某甲比丘彼某甲比丘當還此某甲比丘誰諸長老忍僧持此衣與彼某甲比丘彼某甲比丘當還此某甲比丘者默然誰不忍者說僧已忍與彼某甲比丘衣竟僧忍默然故是事如是持一月衣急施過後畜長鉢及藥皆同唯稱事別為異經宿直還法若無上緣要經宿已羯磨還主一月衣等亦同除此餘者即坐直還二還法同應如是作大德僧聽某甲比丘故畜爾許衆多長衣餘隨種別稱之過十日犯捨墮此衣已捨與僧若僧時到僧忍聽僧持此衣還某甲比丘白如是大德僧聽某甲比丘故畜爾許衆多長衣餘隨種別稱之過十日犯捨墮此衣已捨與僧僧持此衣還某甲比丘誰諸長老忍僧持此衣還某甲比丘者默然誰不忍者說僧已忍還某甲比丘衣竟僧忍默然故是事如是持不還物法於僧中捨衣竟不還者突吉羅若作淨施若遣與人若持作三衣若作波利迦羅衣若故壞若燒若作非衣若數數著壞盡突吉羅對三比丘捨墮法應往三比丘所具儀作是捨云諸大德憶念我某甲比丘故畜等餘詞同上唯不得稱僧為異次請一清淨比丘為懺悔主請詞如前其懺悔主既受請已未得即許應改單白為問邊人問彼二比丘云若二長老聽我受某甲比丘懺者我當受二比丘應答言可爾受懺悔主得許可已方始答懺者云爾正懺詞等同上還衣問和同上不還結罪同上若對二人及一捨懺一一同此更無有異對一人中除問邊人捨乞鉢法是中捨者要須對僧又此住處非餘住處捨及懺悔詞並同前還鉢法此比丘鉢若貴價好者應留置取最下不好者與之白二羯磨應如是與大德僧聽此某甲比丘鉢破減五綴不漏更求新鉢犯捨墮今捨與僧若僧時到僧忍聽僧今與此某甲比丘鉢白如是大德僧聽此某甲比丘鉢破減五綴不漏更求新鉢犯捨墮今捨與僧僧今與此某甲比丘鉢誰諸長老忍僧與某甲比丘鉢者默然誰不忍者說僧已忍與此某甲比丘鉢竟僧忍默然故是事如是持行鉢白法彼比丘鉢應作白已問僧作如是白大德僧聽若僧時到僧忍聽以此鉢次第問上座白如是作此白已當持與上座若上座不取與彼比丘彼比丘應取不應護衆僧故不取亦不應以此因緣受持最下鉢若受突吉羅若上座取應與上座取上座鉢與次座若次坐取一如上座如是展轉乃至下座爾付鉢令持法若持此比丘鉢還此比丘若持最下座鉢與時應白二羯磨作如是與大德僧聽若僧時到僧忍聽僧今以最下座鉢若是此比丘鉢應云僧今以此比丘下鉢與某甲比丘受持乃至破白如是大德僧聽僧今以此若最下座鉢若比丘下鉢與某甲比丘受持乃至破誰諸長老忍僧與某甲比丘鉢者默然誰不忍者說僧已忍與某甲比丘鉢竟僧忍默然故是事如是持彼比丘守護此鉢不得著瓦石落處不得著倚杖下及著倚刀下不得著懸物下不得著道中石上果樹下不平地不得一手捉兩鉢除指隔中央不得一手捉兩鉢開戶除用心不得著戶閾內戶扇下不得著繩床木床下床間床角頭除暫著不得立蕩鉢乃至足令鉢破不應故壞及故令失作非鉢用對俗捨寶法若比丘自手捉金銀若錢若教人捉若置地受彼有信樂守園人若優婆塞當語言此物我所不應汝當知之懺對一人作法同上俗還物法若彼人取還與比丘者當作彼人物故受敕淨人使賞之若得淨衣鉢針筒尼師壇應易受持若優婆塞取已與比丘淨衣鉢尼師壇針筒者應取持之俗不還寶法若彼取已不還令餘比丘語言汝應還此比丘物若餘比丘不語及語不還者當自往語言佛教比丘作淨故與汝若言與僧與塔與和上等與諸親舊知識若還本主何以故不欲失彼信施故淨寶法因此便明淨寶儀軌若依此部別開信樂優婆塞及守園人為淨主寶付彼人應語彼言此物我所不應汝當知之或言知是看是或為佛法僧等受取受時應作淨語淨語應言知是看是若不語彼人言知是看是者突吉羅若依說一切有部淨法者如錢一切寶物應先求一知法白衣淨人語令解意已復語云我比丘之法不畜錢寶今以檀越為淨主後得錢寶盡施檀越若淨主死遠出異國應更求淨主然說淨有二種若白衣持錢寶來與者比丘但言此不淨物我不應畜若淨當受即是淨若白衣言與比丘寶比丘言我不應畜淨人答言易淨物畜即是作淨若白衣不言易淨物畜比丘自不說淨直置地去者若有比丘應向說淨隨久近畜說詞同上捨雜野蠶綿臥具法比丘自至蠶家乞綿作臥具成者自以斤斧斬壞捨作如是法若以斧若以斤細銼斬和泥若塗壁若塗埵自以壞捨故無有還懺對一人作法同上懺九十波逸提罪法欲除本罪還先懺覆品數多少准前應知此中若除本罪先請懺主請法如上請已應對懺主作是悔言大德一心念我某甲比丘故妄語犯爾許衆多波逸提罪餘隨種名事別稱之今向大德懺悔不敢覆藏等同上懺波羅提提舍尼罪法覆品如前請懺主已作如是懺大德一心念我某甲比丘無病故在村中從非親里比丘尼邊自手受食食犯爾許衆多波羅提提舍尼罪餘隨種名事別稱之大德我犯可呵法所不應為今向大德悔過不敢覆藏等同上一說懺突吉羅罪法一切吉羅無問根本從生故作誤作覆及隨覆品數如前至誠懇責要期永斷作如是懺我某甲比丘故不齊整著僧伽梨犯爾許衆多突吉羅罪以故作故復犯爾許衆多非威儀突吉羅罪若誤犯者即無故犯非威儀罪應云我某甲比丘誤不齊整著僧伽梨犯爾許衆多突吉羅罪餘隨種名事別稱之我今懺悔不敢覆藏等同上一切僧同犯識罪發露法律言汝等善聽衆僧集在一處欲說戒當說戒時一切衆僧盡犯罪彼各各作念世尊制戒犯者不得說戒不得聞戒不得向犯者懺悔犯者不得受他懺悔彼比丘白已當懺悔作如是白大德僧聽此一切衆僧犯罪若僧時到僧忍聽此一切僧懺悔白如是作是白已然後說戒一切僧同犯疑罪發露法律言汝等善聽若衆僧集在一處欲說戒當說戒時一切僧於罪有疑彼各各念言世尊制戒犯者不得說戒等如前彼一切僧作白已應說其罪當作是白大德僧聽此一切僧於罪有疑若僧時到僧忍聽此衆僧自說罪白如是作是白已然後說戒別人識罪發露法至一清淨比丘所具儀言大德憶念我某甲比丘犯某甲罪若干衆多今向大德發露後當如法懺悔一說如是已得聞戒別人疑罪發露法還至一清淨比丘所具儀作如是言大德憶念我某甲比丘於某犯生疑今向大德自說須後無疑時當如法懺悔一說如是已得聞戒說戒座中識罪心念發露法律言當說戒時有比丘犯罪彼比丘若有人舉不舉若作憶念不作憶念其人自憶罪而發露彼比丘當語邊人言我犯某甲罪今向長老懺悔復作是念設語傍人恐鬧亂衆僧不成說戒彼比丘當心念言我犯某罪須罷坐已當如法懺悔作如是已得聽說戒說戒座中疑罪心念發露法緣同於前唯疑為異彼心念言我於某罪生疑須罷坐已無疑時當如法懺悔作如是已得聽說戒
