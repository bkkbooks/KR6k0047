body:
  text: 西太原寺沙門懷素集治人篇第十三與呵責羯磨法案律有二法僧應與作呵責羯磨非法說法法說非法乃至說不說亦如是乃至舉羯磨亦如是復有三事僧應與作呵責羯磨謂破戒破見破威儀乃至舉羯磨亦如是復有比丘憙共鬪諍共相罵詈口出刀劍互求長短若復有餘比丘鬪諍往彼勸助是故令僧未有諍事便有諍事已有諍事而不除滅佛言聽僧與作呵責白四集僧集已為作舉作舉已為作憶念作憶念已應與罪與罪已如是作大德僧聽此某甲比丘憙共鬪諍共相罵詈口出刀劍互求長短彼自共鬪諍已若復有餘比丘鬪諍者即復往彼勸言汝等勉力莫不如他汝等多聞智慧財富亦勝多有知識我等當為汝作伴黨令僧未有諍事而有諍事已有諍事而不除滅若僧時到僧忍聽僧為某甲比丘作呵責羯磨若後復更鬪諍共相罵詈者眾僧當更增罪治白如是大德僧聽此某甲比丘憙共鬪諍共相罵詈口出刀劍互求長短彼自共鬪諍已若復有餘比丘鬪諍者即復往彼勸言汝等勉力莫不如他汝等智慧多聞財富亦勝多有知識我等當為汝作伴黨令僧未有諍事而有諍事已有諍事而不除滅僧為某甲比丘作呵責羯磨誰諸長老忍僧與某甲比丘作呵責羯磨若後復更鬪諍共相罵詈者眾僧當更增罪治忍者默然誰不忍者說三說僧已忍為某甲比丘作呵責羯磨竟僧忍默然故是事如是持彼得法已修行七五之行此七五行具如上明解呵責羯磨法若眾僧在小食上後食上若說法若布薩被呵責羯磨人正衣服脫革屣在一面住䠒跪合掌白如是言大德僧受我懺悔自今已去自責心止不復作佛言若隨順眾僧無所違逆求解呵責羯磨聽解作白四羯磨僧應觀察有五法不應為解謂違上七五之行有五法應為解呵責謂不違上七五之行應至僧中具儀作如是乞大德僧聽我某甲比丘僧與作呵責羯磨我今隨順眾僧無所違逆從僧乞解呵責羯磨願僧慈愍故為我解呵責羯磨三說僧應如是與法大德僧聽某甲比丘僧為作呵責羯磨彼比丘隨順眾僧無所違逆從僧乞解呵責羯磨若僧時到僧忍聽解某甲比丘呵責羯磨白如是大德僧聽此某甲比丘僧為作呵責羯磨彼比丘隨順眾僧無所違逆從僧乞解呵責羯磨誰諸長老忍僧為某甲比丘解呵責羯磨者默然誰不忍者說三說僧已忍解某甲比丘呵責羯磨竟僧忍默然故是事如是持與擯羯磨法時有比丘行惡行污他家言惡行者自種花樹教他種等言污家者有四種事一依家污家二依利養污家三依親友污家四依僧伽藍污家此比丘行惡行污他家見聞皆具佛言聽僧為作擯白四此作及解文如律明與依止羯磨法若比丘癡無所知多犯眾罪共白衣雜住而相親附不順佛法佛言聽僧為作依止白四謂遣依止有德人住不得稱方國土等作此作及解亦文如律與遮不至白衣家羯磨法白衣有五法僧應為作遮不至白衣家羯磨此人恭敬父母沙門婆羅門所應持者堅持不捨比丘有十法僧應與作遮不至白衣家羯磨惡說罵白衣家方便令白衣家損減作無利作無住處鬪亂白衣於白衣前謗佛法僧在白衣前作下賤罵如法許白衣而不實此作及差使送懺悔解等亦文如律與不見罪舉羯磨法時有比丘犯罪餘比丘語言汝犯罪見不答言不見佛言聽僧與作不見罪舉白四此作及解亦如律與不懺悔罪舉羯磨法若有比丘犯罪諸比丘語言汝有罪懺悔答言不懺悔佛言聽僧與作不懺悔罪舉白四此作及解亦文如律與不捨惡見舉羯磨法若有比丘如是惡見生作如是言我知佛所說法犯婬欲非障道法佛言聽僧為作呵諫白四諫法如文彼比丘僧與作呵諫故不捨惡見佛言與作不捨惡見舉白四此作及解亦文如律與狂癡羯磨法有三種狂癡一說戒時或憶或不憶或來或不來二或憶而來三或不憶不來是謂三種狂癡是中下二不應與作初一應作白二羯磨應如是與大德僧聽此某甲比丘心亂狂癡或憶說戒或不憶說戒或來或不來若僧時到僧忍聽僧與某甲比丘作心亂狂癡羯磨或憶或不憶或來或不來僧作羯磨說戒白如是大德僧聽此某甲比丘心亂狂癡或憶說戒或不憶說戒或來或不來僧與某甲比丘作心亂狂癡羯磨或憶或不憶或來或不來作羯磨說戒誰諸長老忍僧與某甲比丘作心亂狂癡或憶或不憶或來或不來作羯磨說戒者默然誰不忍者說僧已忍與某甲比丘作心亂狂癡或憶或不憶或來或不來作羯磨竟僧忍默然故是事如是持解狂癡羯磨法若狂病止應白二解彼應具儀作如是乞大德僧聽我某甲比丘先得狂癡病說戒時或憶或不憶或來或不來眾僧與我作狂癡病羯磨作已病還得止今從眾僧乞解狂癡羯磨三說僧應與法大德僧聽此某甲比丘先得狂癡病彼說戒時或憶或不憶或來或不來眾僧與作狂癡病羯磨與作羯磨已狂癡病還得止今從眾僧乞解狂癡病羯磨若僧時到僧忍聽與解狂癡病羯磨白如是大德僧聽此某甲比丘先得狂癡病彼說戒時或憶或不憶或來或不來眾僧與作狂癡病羯磨與作羯磨已狂癡病還得止今從眾僧乞解狂癡病羯磨誰諸長老忍僧與某甲比丘解狂癡病羯磨者默然誰不忍者說僧已忍與某甲比丘解狂癡病羯磨竟僧忍默然故是事如是持佛言隨狂病時與作羯磨狂止還解與學家羯磨法時有居士家夫婦俱得信樂為佛弟子諸佛見諦弟子常法於諸比丘無所愛惜乃至身肉若諸比丘至家常與飲食及諸供養故令貧窮衣食乏盡佛言聽僧與彼居士作學家羯磨應如是作大德僧聽於某城中某居士家夫婦得信為佛弟子財物竭盡若僧時到僧忍聽僧今與作學家羯磨諸比丘不得在某家受食食白如是大德僧聽於某城中某居士家夫婦得信為佛弟子財物竭盡僧今與作學家羯磨諸比丘不得在某家受食食誰諸長老忍僧與某居士作學家羯磨者默然誰不忍者說僧已忍與某居士作學家羯磨竟僧忍默然故是事如是持若先受請若有病若置地與若從人受若學家施後財物還多無犯解學家羯磨法若學家財物還多從僧乞解學家羯磨者僧應白二為解應如是作大德僧聽於某城中某居士家夫婦得信為佛弟子好施財物竭盡僧先與作學家羯磨今財物還多從僧乞解學家羯磨若僧時到僧忍聽解學家羯磨白如是大德僧聽於某城中某居士家夫婦得信為佛弟子財物還多僧今與某居士解學家羯磨誰諸長老忍僧與某居士解學家羯磨者默然誰不忍者說僧已忍與某居士解學家羯磨竟僧忍默然故是事如是持作餘語羯磨法時有比丘犯罪諸比丘問言汝自知犯罪不耶即以餘事報諸比丘汝向誰語為說何事為論何理為語我為語誰耶是誰犯罪罪由何生我不見罪云何言我有罪佛言自今已去聽白已名作餘語應如是白大德僧聽此某甲比丘犯罪諸比丘問言汝今自知犯罪不耶此比丘即以餘事報諸比丘言汝向誰語為說何事為論何理為我說為餘人說誰犯罪罪由何生我不見罪若僧時到僧忍聽當名某甲比丘作餘語白如是作是白已名作餘語若未白前作餘語者一切盡突吉羅若作白已作餘語者一切盡波逸提作觸惱羯磨法時有比丘眾僧立制不得作餘語已便觸惱僧喚來不來不喚來便來應起不起不應起便起應語不語不應語便語佛言聽僧與此比丘作白羯磨已名作觸惱作如是白大德僧聽此某甲比丘僧名作餘語已便觸惱眾僧喚來不來不喚來便來應起不起不應起便起應語不語不應語便語若僧時到僧忍聽制某甲比丘名作觸惱白如是如是白已名作觸惱僧未白前觸惱僧者一切盡突吉羅若作白已觸惱僧者一切盡波逸提惡馬治法時有比丘惡性不受諫語多犯眾罪餘比丘語言汝犯罪見不答言不見僧應捨棄莫問語如是言汝今不見罪汝所往之處彼亦當舉汝罪為汝作自言不聽汝作阿㝹婆陀不聽布薩自恣如調馬師惡馬難調即合所繫韁杙棄之汝比丘不自見罪亦復如是一切捨棄汝所往之處乃至不聽汝布薩自恣是人不應求聽此即是聽梵罰治法時有比丘惡性犯戒復不受諫作默擯治應如是作一切比丘默擯不與語是梵罰治然不改者將詣眾中諸人共彈使出莫與說戒亦莫與法會從事捨教授比丘尼法時六群比丘尼沙彌尼式叉摩那來至寺內共比丘沙彌共住更相調弄共唄共哭或共戲笑亂諸坐禪比丘佛言應喚來謫罰若不改者應為沙彌尼和上闍梨作捨教授羯磨與白衣家作覆鉢羯磨法佛言白衣家有五法不應與作覆鉢不孝順父不孝順母不敬沙門不敬婆羅門不供事比丘有五法應作即反上是復有十法眾僧應與作覆鉢罵謗比丘為比丘作損減作無利益方便令無住處鬪亂比丘於比丘前說佛法僧惡以無根不淨法謗比丘若犯比丘尼如是九八七六五四三二一與作覆鉢應如是與大德僧聽此某甲某甲比丘清淨而以無根波羅夷法謗若僧時到僧忍聽僧今為此某甲作覆鉢不相往來白如是大德僧聽此某甲某甲比丘清淨而以無根波羅夷法謗今僧為某甲作覆鉢不相往來誰諸長老忍僧為某甲作覆鉢不相往來者默然誰不忍者說僧已忍為某甲作覆鉢不相往來竟僧忍默然故是事如是持差比丘使告白衣法佛言應白二羯磨差一比丘為使告白衣令知其使比丘應具八德八德及差廣如律明此使比丘往至彼家不應受床坐飲食供養等直應語云今僧為汝作覆鉢不相往來彼若不解應廣為說彼人若言作何方便解我覆鉢還相往來者彼使應語云汝應往懺悔眾僧彼若懺悔隨順眾僧不敢違逆從僧乞解覆鉢還相往來者僧應為解解文如律設諫篇第十四諫破僧法若比丘方便欲破和合僧受破僧法堅持不捨彼比丘諫此比丘言大德莫方便欲破和合僧莫受破僧法堅持不捨大德當與僧和合歡喜不諍同一水乳於佛法中有增益安樂住大德可捨此事莫令僧作呵諫而犯重罪若用語者善若不用語者復令比丘比丘尼優婆塞優婆夷若王大臣種種異道沙門婆羅門求若餘方比丘聞知其人信用言者應來若用言者善若不用言者應作白作白已應更求大德我已白竟餘有羯磨在汝今可捨此事莫令僧為汝作羯磨更犯重罪若用語者善若不用語者應作初羯磨作初羯磨已應更求大德我已白作初羯磨竟餘有二羯磨在汝可捨此事莫令僧更為汝作羯磨而犯重罪若用言者善若不用言者應作第二羯磨作第二已應更求云大德我已作白二羯磨竟餘有一羯磨在汝可捨此事莫令僧更為汝作羯磨而犯重罪若能捨者善若不能捨者與說第三羯磨說第三羯磨竟僧伽婆尸沙作白二羯磨竟捨者三偷蘭遮作白一羯磨竟捨者二偷蘭遮作白竟捨者一偷蘭遮若初白未竟捨者突吉羅若一切未白前方便欲破和合僧受破和合僧法堅持不捨一切突吉羅羯磨法體具如律明諫破僧助伴法眾僧諫彼破僧比丘時復有非法群黨比丘一二三眾多語諸比丘言大德汝莫諫此比丘此比丘是法語比丘律語比丘此比丘所說我等忍可諸比丘應語言汝莫作是語言此比丘是法語比丘律語比丘此比丘所說我等忍可而此比丘非法語比丘非律語比丘汝等莫壞和合僧當助和合僧大德與僧和合歡喜不諍等如前羯磨法體亦如律明諫被擯謗僧法時有比丘行惡行污他家見聞皆具僧作擯法便謗僧言諸比丘有愛有恚有怖有癡有如是同罪比丘有驅者有不驅者諸比丘應語彼言大德污他家亦見亦聞行惡行亦見亦聞大德污他家行惡行可捨此事莫為僧所呵更犯重罪若隨語者善若不隨語者乃至與說第三如上白四法體亦如律明諫惡性不受語法若比丘惡性不受人語諸比丘以戒律如法教授自身作不可共語語諸比丘言大德莫語我若好若惡我亦不語諸大德若好若惡大德止不須諫我彼比丘諫此比丘言大德莫自作不可共語當作可共語大德如法諫諸比丘諸比丘亦當如法諫大德如是佛弟子眾得增益展轉相教展轉相諫展轉懺悔大德可捨此事莫為僧所呵更犯重罪若隨語者善若不隨語者乃至第三如上白四法體亦如律明諫惡見說欲不障道法彼比丘作如是言我知佛所說法行婬欲非障道法諸善比丘應諫此比丘言汝莫作是語莫謗世尊謗世尊者不善世尊不作是語世尊無數方便說行婬欲是障道法汝今可捨此事莫為僧所呵更犯罪若隨語者善若不隨語者乃至第三如上白四法體亦如律明呵諫說欲不障道沙彌法同此無異諫犯罪法時有比丘欲犯波羅夷乃至惡說諸比丘應諫此比丘言大德莫作語是此不應爾大德所作非法非律非佛所教然此比丘不從諸善比丘如法諫勸即便犯戒若此比丘自知所作是明他諫者非故作犯根本不從語者突吉羅若此比丘自知所作非明他諫者是故作犯根本不從語者波逸提若無智人不知諫法應語彼云汝可問汝和上阿闍梨更學問誦經知諫法已然後設諫滅諍篇第十五與現前毘尼法時諸比丘人不現前便作羯磨佛言不應人不現前而作羯磨自今已去為諸比丘結現前毘尼滅諍應如是說現前毘尼但現前有五謂法毘尼人僧界云何法現前所持法滅諍者是云何毘尼現前所持毘尼滅諍者是云何人現前言義往返者是云何僧現前同羯磨和合集一處不來者囑授在現前應呵者不呵是云何界現前在界內羯磨作制治者是與憶念毘尼法時諸比丘實不犯重罪波羅夷僧伽婆尸沙偷蘭遮諸比丘皆言犯重罪問言汝憶犯重罪不彼不憶犯答言我不憶犯如是罪即語諸比丘言長老莫數詰問我諸比丘故詰問不止佛言聽僧為作憶念毘尼白四羯磨乞作如文自今已去與諸比丘結憶念毘尼滅諍應如是說憶念毘尼云何憶念毘尼彼比丘此罪更不應舉不應作憶念與不癡毘尼法時有比丘癡狂心亂多犯眾罪非沙門法言無齊限行來出入不順威儀後還得心時諸比丘言犯重罪波羅夷僧伽婆尸沙問言汝憶犯重罪不彼即答言我先癡狂心亂時多犯眾罪非我故作是狂癡耳諸長老不須數見難詰諸比丘故難詰不止佛言聽僧與作不癡毘尼白四羯磨乞作如文自今已去與諸比丘結不癡毘尼滅諍應如是說不癡毘尼云何不癡毘尼彼比丘此罪更不應舉不應作憶念與自言治毘尼法比丘以天眼清淨見比丘犯戒不取自言牽出門外佛言不應如是若於異時亦不應如是令彼伏罪然後與罪不應不自伏罪而與罪自今已去為諸比丘結自言治滅諍應如是說自言毘尼是中人現前者受懺者懺悔者是云何自言說罪名說罪種懺悔者是云何治自責汝心生厭離也與多人語毘尼法諸比丘諍事現前不能滅者應多求如法比丘行舍羅滅諍以籌多表語自今已去為諸比丘結用多人語滅諍法應如是說用多人語云何多人語若用多人說持法持毘尼持摩夷與罪處所毘尼法時諸比丘犯罪前後相違佛言聽僧與彼比丘作罪處所白四羯磨應如是與集僧集已為作舉作舉已與作憶念作憶念已與罪作法如文作已順行七五之行自今已去為諸比丘結罪處所滅諍法應如是說結罪處所云何罪處所彼比丘此罪與作舉作憶念者是與草覆地毘尼法諸比丘作念我曹多犯眾戒非沙門法亦作亦說出入無限若我曹還自共善問此事或能令此諍事轉深重經歷年月不得如法如毘尼如佛所教滅除諍事令僧不得安樂佛言應滅此諍猶如草覆地自今已去為諸比丘結如草覆地滅諍法應如是說如草覆地云何草覆地此罪更不說罪名罪種懺悔者是諍有四種言諍覓諍犯諍事諍云何言諍比丘共比丘諍言引十八諍事法非法乃至說不說若以如是相共諍言語遂彼此共鬪是為言諍云何覓諍若比丘與比丘覓罪以三舉事破戒破見破威儀見聞疑作如是相覓罪共語不妄求伴勢力安慰其意若舉作憶念若安此事若不安此事不癡不脫是為覓諍云何犯諍犯七種罪波羅夷乃至惡說是為犯諍云何事諍言諍中事作覓諍中事作犯諍中事作是為事諍舉藥對諍律文廣明雜行篇第十六結說戒堂法律言不知當於何處說戒佛言聽作說戒堂應一比丘具儀唱某大堂閣上堂經行堂若河側若樹下若石側生草處已應如是作大德僧聽若僧時到僧忍聽在某處作說戒堂白如是大德僧聽今眾僧在某處作說戒堂誰諸長老忍僧在某處作說戒堂者默然誰不忍者說僧已忍聽在某處作說戒堂竟僧忍默然故是事如是持解說戒堂法時諸比丘先立說戒堂復欲餘處立聽解前說戒堂然後更結應如是解大德僧聽若僧時到僧忍聽解某處說戒堂白如是大德僧聽今僧解某處說戒堂誰諸長老忍僧解某處說戒堂者默然誰不忍者說僧已忍解某處說戒堂竟僧忍默然故是事如是持結庫藏法時客比丘來移衣物著餘房不堅牢佛聽別房結作庫藏屋應一比丘唱某房若溫室若重屋若經行處作庫藏屋唱已應如是作大德僧聽若僧時到僧忍聽僧結某甲房作庫藏屋白如是大德僧聽僧結某甲房作庫藏屋誰諸長老忍僧結某甲房作庫藏屋者默然誰不忍者說僧已忍結某甲房作庫藏屋竟僧忍默然故是事如是持若庫藏不堅牢聽差守庫藏人具德如上若不肯者與福饒與粥若故不肯一切所受衣食分應與二分若故不肯當如法治解庫藏法文略無解應翻結云大德僧聽若僧時到僧忍聽僧解某甲房庫藏屋白如是大德僧聽僧解某甲房庫藏屋誰諸長老忍僧解某甲房庫藏屋者默然誰不忍者說僧已忍解某甲房庫藏屋竟僧忍默然故是事如是持與無主為己造房法彼比丘看無難無妨處已僧中具儀作如是乞大德僧聽我某甲比丘自乞作屋無主自為己我今從僧乞處分無難無妨處三說僧應觀察此比丘為可信不若可信者即當聽作若不可信者一切僧應到彼看若僧不去遣僧中可信者看若彼處有難有妨處不應與處分若無難有妨處有難無妨處亦不應與處分若無難無妨處應與處分作如是與大德僧聽某甲比丘自求作屋無主自為己從僧乞處分無難無妨處若僧時到僧忍聽僧今與某甲比丘處分無難無妨處白如是大德僧聽某甲比丘自求作屋無主自為己從僧乞處分無難無妨處僧今與某甲比丘處分無難無妨處誰諸長老忍僧與某甲比丘處分無難無妨處者默然誰不忍者說僧已忍與某甲比丘處分無難無妨處竟僧忍默然故是事如是持有主造房文同但稱有主為異與結不失衣法時有比丘得乾痟病有糞掃僧伽梨患重自思念言世尊與諸比丘結戒不得離衣宿我今得乾痟病有糞掃僧伽梨極重有因緣欲往人間行不堪持行佛言自今已去聽僧與此病比丘結不失衣白二羯磨應至僧中具儀作如是乞大德僧聽我某甲比丘得乾痟病此糞掃僧伽梨重有因緣事欲人間行不堪持行我今從僧乞結不失衣法三說僧如是與大德僧聽某甲比丘得乾痟病有糞掃僧伽梨重有因緣事欲人間行不堪持行從僧乞結不失衣法若僧時到僧忍聽與此比丘結不失衣法白如是大德僧聽某甲比丘得乾痟病有糞掃僧伽梨重有因緣事欲人間行不堪持行從僧乞結不失衣法今僧與某甲比丘結不失衣法誰諸長老忍僧與某甲比丘結不失衣法者默然誰不忍者說僧已忍與某甲比丘結不失衣法竟僧忍默然故是事如是持與作新臥具法時有比丘得乾痟病有糞掃臥具極重自念世尊制戒作新臥具持至六年若減六年不捨故臥具更作新者尼薩耆波逸提我今得乾痟病此臥具重不堪持行佛言聽僧與彼比丘白二羯磨當往僧中具儀作如是乞大德僧聽我某甲比丘得乾痟病有小因緣欲人間行有糞掃臥具極重不堪持行我今從僧乞作新臥具羯磨三說僧如是與大德僧聽此某甲比丘得乾痟病欲人間行有糞掃臥具重今從僧乞作新臥具羯磨若僧時到僧忍聽僧與此某甲比丘作新臥具羯磨白如是大德僧聽此某甲比丘得乾痟病有糞掃臥具重欲人間遊行今從僧乞更作新臥具羯磨僧與此某甲比丘更作新臥具羯磨誰諸長老忍僧與此某甲比丘更作新臥具羯磨者默然誰不忍者說僧已忍與某甲比丘更作新臥具羯磨竟僧忍默然故是事如是持與畜杖絡囊法時有比丘羸老不能無絡囊盛鉢無杖而行佛言聽僧與彼老比丘作杖絡囊白二羯磨應至僧中具儀作如是乞大德僧聽我某甲比丘老病不能無絡囊盛鉢無杖而行今從僧乞畜杖絡囊願僧聽我某甲比丘畜杖絡囊慈愍故三說僧應如是與法大德僧聽此某甲比丘羸老不能無絡囊盛鉢無杖而行今從僧乞杖絡囊若僧時到僧忍聽與某甲比丘杖絡囊白如是大德僧聽此某甲比丘羸老不能無杖絡囊而行今從僧乞杖絡囊僧今與此某甲比丘杖絡囊誰諸長老忍僧與某甲比丘杖絡囊者默然誰不忍者說僧已忍與某甲比丘杖絡囊竟僧忍默然故是事如是持六念法依僧祇云第一念謂知日數月之大小黑白稱云此月大月小稱小白月一日乃至十五日黑月應云黑月一日乃至十四十五日西方本制月有黑白白月純大黑有小大此土月以三十日為故作念者通知大小即應此方立其月法別言黑白一二日等復順西方本制月日第二念謂知食處食處不定隨其食處稱云或食僧常食或常乞食或受彼請或自食等若無食處稱云今日念不背請食第三念謂知受戒時日歲數稱云我於某年某月某日某時一尺木若干影受具足戒無夏若有夏者隨夏稱之第四念謂知衣鉢緣資有無具闕若衣鉢有闕者隨有稱云某衣及鉢具餘不具者稱云某衣及鉢不具念當時具若總具足應云三衣鉢具餘長衣藥鉢念知已淨未淨若有未淨者稱云有某長衣及藥鉢未作淨念當說淨若無稱云無長衣藥鉢第五念謂知食之同別勸與眾同稱云不別眾食第六念謂知病不有病者云我今有病念當療治無病者云我今無病依眾行道捨請法若比丘無病及施衣緣一日之中有多請者應自受一請餘者轉施與人作如是言長老某甲家請我施五正食我應往彼今布施汝若不捨前請受後請食食者咽咽波逸提若不捨後請受前請食食者咽咽突吉羅作餘食法食有二種一者正食二者不正食不正食者謂根莖食等此非正食非足正食者謂飯乾飯魚及肉若粥初出釜以草畫之不合者是正食不得食於五種食中若食一一食令飽足已捨威儀不作餘食法食者咽咽波逸提若欲食者持食至一未足食比丘所作如是言大德我足食已知是看是此作餘食法彼比丘應取少許食已語此比丘言長老我已食止汝取食之彼應答言爾作此法已得隨意食別眾食白入出法別眾者若四人若過四人若二人三人隨意食四人若過應分二部更互食若比丘有別眾食因緣欲入食者當起白言我有某別眾食緣欲求入佛言當聽隨上座次入別眾食緣者病時作衣時施衣時道行時船行時大眾集時沙門施食時若比丘無別眾食因緣彼比丘即當起白言我於此別眾食中無因緣欲求出佛言聽出若比丘別眾食咽咽波逸提若有因緣不說突吉羅前食後食詣餘家囑授法諸比丘大有請處畏慎不敢入城佛言聽諸比丘相囑入城若獨一房者當囑比房比丘作如是言大德一心念我某甲比丘已受某甲請今有某緣入某聚落至某甲家白大德令知病時作衣時施衣時開不囑授若囑授已欲詣所去處而中道還或不至所囑處更詣餘家乃至庫藏處聚落邊房及尼伽藍若至所囑處