body:
  text: 西太原寺沙門懷素集原夫鹿苑龍城啓尸羅之妙躅象巖鷲嶺開解脫之玄宗於是三千大千受清涼而出火宅天上天下乘戒筏而越迷津內衆於是敷榮外徒由斯安樂其後韜真細㲲多聞折軸之憂掩正微言罕見浮囊之固即有飲光秀出維絶紐而虛求波離聿興振隤綱而幽贊慧炬於焉重朗戒海由是再清其律教也弘深固難得而遍舉此羯磨者則紹隆之正術匡護之宏規宗緒歸於五篇濫觴起於四分實菩提之機要誠涅槃之津涉者也素以鋭思弱齡留情斯旨眇觀至教式考義途丞歷炎涼庶無大過誤耳然自古諸德取解不同各述異端總有五本一本一卷曹魏鎧律師於許都集題云曇無德雜羯磨以結戒場為首受日加乞不入羯磨屢有增減乖於律文一本一卷曹魏曇諦於雒陽集題云羯磨一卷出曇無德律以結大界為首受日增乞牒入羯磨魏郡礪律師受持此本鋭想針規雖去尤非未祛謏過分為兩卷并造義釋一本一卷元魏光律師於鄴下集此同曇諦集本述録不順正文一本兩卷隋願律師於并州撰題云羯磨卷上出曇無德律願雖自曰依文無片言增減然詳律本非無損益兼造章疏并汾盛行一本一卷皇朝宣律師於京兆撰題云刪補隨機羯磨斯有近棄自部之正文遠取他宗之傍義教門既其雜亂指事屢有乖違并造義疏頗行於代素於諸家撰集莫不研尋校理求文抑多乖舛遂以不敏輒述幽深分為三卷勒成一部庶無增減以適時機祇取成文非敢穿鑿惟願戒珠增照叶日月而齊明繫草傳芳與天地而同朽後之覽者知斯志焉方便篇第一僧集律言應來者來又言僧有四種四人五人十人二十人四人僧者除受大戒自恣出罪餘一切羯磨應作五人僧者除中國受大戒出罪餘一切羯磨應作十人僧者除出罪餘一切羯磨應作二十人僧者一切羯磨應作況復過二十若隨四位僧中有少一人者作法不成非法非毗尼和合律言同一羯磨和合集一處不來者囑授在現前應呵者不呵又言五法應和合若如法應和合若默然任之若與欲若從可信人聞若先在中默然而坐如是五事應和合未受大戒者出律言不應在未受大戒人前作羯磨說戒又言聽除人未受大戒餘者在前作羯磨說戒又言有四滿數有人得滿數不應呵有人不得滿數應呵有人不得滿數亦不應呵有人得滿數亦應呵何等人得滿數不應呵若為作呵責羯磨擯羯磨依止羯磨遮不至白衣家羯磨何等人不得滿數應呵若欲受大戒人何等人不得滿數亦不得呵若為比丘作羯磨比丘尼不得滿數亦不得呵式叉摩那沙彌沙彌尼若言犯邊罪等十三人若被舉若滅擯若應滅擯若別住若在戒場上若神足在空若隱沒若離見聞處若所為作羯磨人何等人得滿數亦得呵若善比丘同一界住不以神足在空不隱沒不離見聞處乃至語傍人不來諸比丘說欲及清淨唯除結界不得說欲其欲須與清淨合說若自恣時應言與欲自恣若有佛法僧事病患事看病緣聽與欲律言與欲有五種若言與汝欲若言我說欲若言為我說欲若現身相與欲若廣說與欲若不現身相不口說欲者不成與欲應更與餘者欲其持欲人受欲已便命過若餘處行若罷道若入外道衆若入別部衆若至戒場上若明相出若自言犯邊罪等十三人若被舉若滅擯若應滅擯若神足在空若離見聞處不成與欲應更與餘者欲若至中道若至僧中亦如是若廣說欲者應往傳欲人所具儀作如是言大德一心念我某甲比丘如法僧事與欲清淨時持欲比丘自有事起不及詣僧者聽轉欲與餘人轉時應云大德一心念我某甲比丘與某甲比丘受欲清淨彼及我身如法僧事與欲清淨持欲比丘至僧說時若能記識姓名者對僧一一稱說云大德僧聽某甲比丘某甲比丘如法僧事與欲清淨若不能記姓名但云衆多若受欲人若睡若入定或忘若不故作如是名為成與欲若故不說者突吉羅僧今何所作為然所為事有其三種一為情事如受懺等二為非情事如結諸界三情非情事如處分離衣等此所為事委僧量宜故須對衆問其所作某羯磨羯磨約體但三謂單白白二白四律言有七種羯磨不應作非法非毗尼羯磨非法別衆羯磨非法和合羯磨法別衆羯磨法相似別衆羯磨法相似和合羯磨呵不止羯磨應作如法如毗尼羯磨應白二羯磨如白法作白如羯磨法作羯磨白四羯磨亦爾是為如法如毗尼羯磨此方便六遍餘諸法唯除結界闕者不成結界篇第二結大界法律言當敷座當打揵椎盡共集共集一處不聽受欲是中舊住比丘應唱大界四方相若東方有山稱山有塹稱塹若村若城若疆畔若園若林若池若樹若石若垣牆若神祀舍如東方相餘方亦爾但結界處不得二界相接應留中間不得隔駛流水結除常有橋船唱相之法應起禮僧白言大德僧聽我舊住比丘某甲若非舊住識界者唱應除舊住二言為僧唱大界四方相白已應唱謂從東南角等次第而唱乃至三說衆中差堪能作羯磨者若上座若次座若誦律若不誦律當如是作大德僧聽逖徑反此住處比丘唱四方大界相若僧時到僧忍聽逖零反僧今於此四方相內結大界同一住處同一說戒白如是大德僧聽此住處比丘唱四方大界相僧今於此四方相內結大界同一住處同一說戒誰諸長老忍僧於此四方相內結大界同一住處同一說戒者默然誰不忍者說僧已忍於此四方相內同一住處同一說戒結大界竟僧忍默然故是事如是持解大界法時諸比丘有欲廣作界及狹作者佛言欲改作者先解前界然後欲廣狹作從意當作白二解應如是作大德僧聽今此住處比丘同一住處同一說戒若僧時到僧忍聽解界白如是大德僧聽此住處比丘同一住處同一說戒今解界誰諸長老忍僧同一住處同一說戒解界者默然誰不忍者說僧已忍聽同一住處同一說戒解界竟僧忍默然故是事如是持結同一說戒同一利養界法時有二處別利養別說戒諸比丘欲結共一說戒共一利養界佛言自今已去聽各自解界然後白二結當敷座等如前應如是作大德僧聽如所說界相若僧時到僧忍聽今僧於此處彼處結同一說戒同一利養界白如是大德僧聽如所說界相今僧於此處彼處結同一說戒同一利養界誰諸長老忍僧於此處彼處同一說戒同一利養結界者默然誰不忍者說僧已忍於此處彼處同一說戒同一利養結界竟僧忍默然故是事如是持結同一說戒別利養界法有二住處別說戒別利養比丘意欲同一說戒別利養佛言聽各自解界然後結結法同前唯改一句云同一說戒別利養白如是結別說戒同一利養界法時二住處別說戒別利養時諸比丘欲得別說戒同一利養欲守護住處故佛聽白二結應如是作大德僧聽若僧時到僧忍聽今僧於此彼住處結別說戒同一利養為欲守護住處故白如是大德僧聽今僧於此彼住處結別說戒同一利養為守護住處故誰諸長老忍僧於此彼住處結別說戒同一利養為守護住處故者默然誰不忍者說僧已忍於此彼住處結別說戒同一利養為守護住處故竟僧忍默然故是事如是持此及前二律無解法若欲解者准結翻解翻相應知結戒場法時諸比丘有須四比丘衆五比丘衆十比丘衆二十比丘衆羯磨事起是中大衆集會疲極佛言聽結戒場稱四方界相若安杙若石若疆畔若齊限是中結者安三重相最內一重是戒場相中間一重是大界內相此與戒場相不得相入及並應留中間最外一重是大界外相先唱戒場相結唱法如上應如是作大德僧聽此住處比丘稱四方小界相若僧時到僧忍聽僧今於此四方小界相內結作戒場白如是大德僧聽此住處比丘稱四方小界相僧今於此四方小界相內結戒場誰諸長老忍僧於此四方相內結戒場者默然誰不忍者說僧已忍於此四方相內結作戒場竟僧忍默然故是事如是持次唱大界內外相唱及結如上解戒場法文略無解若欲解者應翻結云大德僧聽此住處比丘戒場若僧時到僧忍聽解戒場白如是大德僧聽此住處比丘戒場僧今於此解戒場誰諸長老忍僧於此解戒場者默然誰不忍者說僧已忍於此解戒場竟僧忍默然故是事如是持難結小界授戒法時有欲受戒者至界外六群比丘往遮佛言汝等善聽自今已去不同意者未出界聽在界外疾疾一處集結小界應如是作大德僧聽僧集一處結小界若僧時到僧忍聽結小界白如是大德僧聽今此僧一處集結小界誰諸長老忍僧一處集結小界者默然誰不忍者說僧已忍結小界竟僧忍默然故是事如是持解難結小界授戒法律言自今已去應解界已去不應不解界而去應如是解大德僧聽今衆僧集解界若僧時到僧忍聽解界白如是大德僧聽今衆僧集解界誰諸長老忍僧集解界者默然誰不忍者說僧已忍解界竟僧忍默然故是事如是持難結小界說戒法律言若布薩日於無村曠野中行衆僧應和合集在一處共說戒若僧不得和合隨同和上等當下道各集一處結小界說戒當如是結大德僧聽今有爾許比丘集若僧時到僧忍聽結小界白如是大德僧聽今有爾許比丘集結小界誰諸長老忍爾許比丘集結小界者默然誰不忍者說僧已忍爾許比丘集結小界竟僧忍默然故是事如是持解難結小界說戒法不應不解界去應如是解大德僧聽今有爾許比丘集若僧時到僧忍聽解此處小界白如是大德僧聽今有爾許比丘集解此處小界誰諸長老忍僧解此處小界者默然誰不忍者說僧已忍解此處小界竟僧忍默然故是事如是持難結小界自恣法律言若衆多比丘於自恣日在非村阿練若未結界處道行若和合得自恣者善若不得和合者隨所同和上等移異處結小界作自恣應如是作大德僧聽諸比丘坐處已滿齊如是比丘坐處若僧時到僧忍聽僧今於此處結小界白如是大德僧聽齊如是比丘坐處僧於此處結小界誰諸長老忍齊如是比丘坐處僧於此處結小界者默然誰不忍者說僧已忍齊如是比丘坐處結小界竟僧忍默然故是事如是持解難結小界自恣法不應不捨界去應如是捨大德僧聽齊如是比丘坐處若僧時到僧忍聽僧今解此處小界白如是大德僧聽齊如是比丘坐處僧今解此處小界誰諸長老忍僧齊如是比丘坐處解小界者默然誰不忍者說僧已忍齊如是比丘坐處解小界竟僧忍默然故是事如是持結不失衣界法時有厭離比丘見阿蘭若有一好窟自念言我若得離衣宿者可即於此窟住佛言自今已去當結不失衣界白二羯磨當如是作大德僧聽此處同一住處同一說戒若僧時到僧忍聽結不失衣界白如是大德僧聽此處同一住處同一說戒僧今結不失衣界誰諸長老忍僧於此處同一住處同一說戒結不失衣界者默然誰不忍者說僧已忍此處同一住處同一說戒結不失衣界竟僧忍默然故是事如是持時諸比丘脫衣置白衣舍當著脫時形露佛言聽結不失衣界除村村外界結法如上唯加一句云除村村外界白如是解不失衣界法文略無解應翻結云大德僧聽此處同一住處同一說戒若僧時到僧忍聽解不失衣界白如是大德僧聽此處同一住處同一說戒今解不失衣界誰諸長老忍僧於此處同一住處同一說戒解不失衣界者默然誰不忍者說僧已忍此處同一住處同一說戒解不失衣界竟僧忍默然故是事如是持有村解法翻亦同此結淨地法時有吐下比丘使舍衛城中人煮粥時有因緣城門晚開未及得粥便死佛言聽在僧伽藍內結淨地白二羯磨應唱房若處若溫室若經行處應一比丘起已具儀於僧中唱某院及諸果菜等處作淨地唱已應如是作大德僧聽若僧時到僧忍聽僧今結某處作淨地白如是大德僧聽僧今結某處作淨地誰諸長老忍僧結某處作淨地者默然誰不忍者說僧已忍結某處作淨地竟僧忍默然故是事如是持律言有四種淨地一者檀越若經營人作僧伽藍時處分如是言某處為僧作淨地二者若為僧作僧伽藍未施僧三者若半有籬障若多無籬障若都無若垣牆若塹亦如是四者僧作白二羯磨結解淨地法文略無解應翻結云大德僧聽若僧時到僧忍聽僧今解某處淨地白如是大德僧聽僧今解某處淨地誰諸長老忍僧解某處淨地者默然誰不忍者說僧已忍解某處淨地竟僧忍默然故是事如是持授戒篇第三善來授戒法按律時聞法者即於座上諸塵垢盡得法眼淨見法得法成辦諸法已獲果實前白佛言我今欲於如來所出家修梵行佛言來比丘於我法中快自娛樂修梵行盡苦源唱此言已鬚髮自落袈裟著身鉢盂在手即名出家受具足戒三歸授戒法時有聞法得信欲受具戒時諸比丘將詣佛所中道失信不得受具戒佛言自今已去聽汝等即與出家授具足戒教令剃髮著袈裟脫革屣右膝著地合掌作是語我某甲歸依佛歸依法歸依僧今於如來所出家如來至真等正覺是我世尊三說我某甲已歸依佛歸依法歸依僧於如來所出家如來至真等正覺是我世尊三說羯磨授戒與度人法若比丘愚癡輒便度人而不知教授以不教授故不按威儀乞食不如法處處受不淨食或受不淨鉢食在小食大食上高聲大喚如婆羅門聚會法佛言聽僧與授具足者白二羯磨彼至僧中具儀作如是求大德僧聽我某甲比丘求衆僧乞度人授具足戒願僧聽我某甲比丘度人授具足戒三說僧當觀察此人若不堪能教授及不能二法攝取者當語言止勿度人若有智慧堪能教授及二法攝取者應如是與法大德僧聽此某甲比丘今從衆僧乞授人具足戒若僧時到僧忍聽僧今與某甲比丘授人具足戒白如是大德僧聽此某甲比丘今從衆僧乞授人具足戒僧今與某甲比丘授人具足戒誰諸長老忍僧與某甲比丘授人具足戒者默然誰不忍者說僧已忍聽某甲比丘授人具足戒竟僧忍默然故是事如是持依止闍梨法亦同此度沙彌與形同法時有巧師家兒來至僧伽藍中求諸比丘出家為道諸比丘輒與出家為道其父母啼泣來至僧伽藍中問諸比丘頗見如是如是小兒來不不見者報言不見即便於諸房中求覓得諸長者譏嫌佛言自今已去若欲在僧伽藍中剃髮當白一切僧若不得和合房房語令知僧若和合作如是白大德僧聽此某甲欲求某甲剃髮若僧時到僧忍聽與某甲剃髮白如是作此白已然後剃髮度沙彌與法同請和上法若欲在僧伽藍中出家者先請和上具儀作如是請大德一心念我某甲今請大德為十戒和上願大德為我作十戒和上我依大德故得受沙彌戒慈愍故三說應報可爾請闍梨法具儀作如是請大德一心念我某甲今請大德為十戒阿闍梨願大德為我作十戒阿闍梨我依大德故得受沙彌戒慈愍故三說應報可爾白僧法若不得和合者當語一切僧知若得和合作如是白大德僧聽此某甲從某甲求出家若僧時到僧忍聽與某甲出家白如是授戒法教著袈裟具儀作如是言我某甲歸依佛歸依法歸依僧隨如來出家某甲為和上如來至真等正覺是我世尊三說我某甲歸依佛歸依法歸依僧隨如來出家竟某甲為和上如來至真等正覺是我世尊三說授十戒相語云盡形壽不殺生是沙彌戒能持不答言能盡形壽不盜是沙彌戒能持不答言能盡形壽不淫是沙彌戒能持不答言能盡形壽不妄語是沙彌戒能持不答言能盡形壽不飲酒是沙彌戒能持不答言能盡形壽不得著華鬘香油塗身是沙彌戒能持不答言能盡形壽不得歌舞倡伎及往觀聽是沙彌戒能持不答言能盡形壽不得高廣大床上坐是沙彌戒能持不答言能盡形壽不得非時食是沙彌戒能持不答言能盡形壽不得執持生像金銀寶物是沙彌戒能持不答言能此是沙彌十戒盡形壽不得犯能持不答言能汝已受戒竟當供養三寶勤修三業坐禪誦經勤作衆事授已教誦十數其十者一一切衆生皆依飲食二名色三三受四四聖諦五五陰六六入七七覺分八八聖道九九衆生居十十一切入度外道法律言自今已去聽與外道衆僧中四月共住白二羯磨當如是與先剃髮已著袈裟乃至合掌教作是言大德僧聽我某甲外道歸依佛歸依法歸依僧我於世尊所求出家為道世尊即是我如來至真等正覺三說我某甲外道歸依佛歸依法歸依僧已從如來出家學道如來是我至真等正覺三說次與戒相與法同上與四月共住法次應教作是言大德僧聽我某甲外道從僧乞四月共住願僧慈愍故與我四月共住三說安著眼見耳不聞處僧應作如是法大德僧聽彼某甲外道今從衆僧乞四月共住若僧時到僧忍聽與彼某甲外道四月共住白如是大德僧聽彼某甲外道今從衆僧乞四月共住僧今與彼四月共住誰諸長老忍僧與彼四月共住者默然誰不忍者說僧已忍與彼外道四月共住竟僧忍默然故是事如是持彼行共住竟令諸比丘心喜悅然後當於僧中受具足戒云何外道不能令諸比丘心喜悅彼外道心故執持外道白衣法不親比丘親外道不隨順比丘誦習異論若聞人說外道不好事便起瞋恚若聞人毀訾外道師教亦起瞋恚若有異外道來讚歎外道好事歡喜踊躍若有外道師來聞讚歎外道事亦歡喜踊躍若聞說佛法僧非法事亦歡喜踊躍是謂外道不能令諸比丘喜悅云何外道能令比丘喜悅即反上是是謂外道共住和調心意令諸比丘喜悅也受具戒請和上法應偏露等作如是請大德一心念我某甲今請大德為和上願大德為我作和上我依大德故得受具足戒慈愍故三說答云可爾或云如是或云當教授汝或云清淨莫放逸請戒師法具儀作如是請大德一心念我某甲今請大德為羯磨阿闍梨願大德為我作羯磨阿闍梨我依大德故得受具足戒慈愍故三說應報可爾請教授師法具儀作如是請大德一心念我某甲今請大德為教授阿闍梨願大德為我作教授阿闍梨我依大德故得受具足戒慈愍故三說應報可爾安受戒人處所法應安眼見耳不聞處其受戒人若在空若隱沒若離見聞處若界外不名受具和上及足數比丘亦如是差教授師法按律有如是教一切污辱衆僧者不得受具足戒時有欲受戒者諸比丘將至界外脫衣看時受戒者慚恥稽留受戒事佛言不得如是露形看自今已去聽先問十三難事然後授戒是中戒師問云衆中誰能為某甲作教授師若作師者即應答云我某甲能答已戒師應作是白大德僧聽彼某甲從某甲求受具足戒若僧時到僧忍聽某甲為教授師白如是往彼問遮難法時教授師往彼語言此安陀會鬱多羅僧僧伽梨鉢此衣鉢是汝有不彼答是已復應語言善男子諦聽今是至誠時實語時我今問汝隨我問答若不實者當言不實若實言實汝不犯邊罪不汝不犯比丘尼不汝非賊心入道不汝非破內外道不汝非黃門不汝非殺父不汝非殺母不汝非殺阿羅漢不汝非破和合僧不汝非惡心出佛身血不汝非是非人不汝非畜生不汝非有二形不汝字何等和上字誰汝年滿二十不衣鉢具不父母聽汝不汝非負人債不汝非奴不汝非官人不汝是丈夫不丈夫有如是病癩癰疽白癩乾痟癲狂病汝今有此諸病不若其一一隨事答無復應語言如我今問汝僧中亦當如是問如汝向者答我僧中亦當如是答問已白僧法彼教授師問已還來僧中如常威儀相去舒手相及處立作如是白大德僧聽彼某甲從某甲求受具足戒若僧時到僧忍聽我已問竟聽將來白如是從僧乞戒法彼應喚言汝來來已當為捉衣鉢教禮僧禮已在戒師前具儀教作是言大德僧聽我某甲從某甲求受具足戒我某甲今從僧乞受具足戒某甲為和上願僧慈愍故拔濟我三說若教乞戒不乞戒著俗服等若眠醉狂裸形瞋恚無心身相不具借他衣鉢若無和上若多和上皆不名受具足戒戒師白法戒師欲問先白白云大德僧聽此某甲從某甲求受具足戒此某甲今從僧乞受具足戒某甲為和上若僧時到僧忍聽我問諸難事白如是戒師問法語言善男子聽今是至誠時實語時今隨所問汝汝當隨實答汝不犯邊罪不汝不犯比丘尼不汝非賊心入道不汝非壞二道不汝非黃門不汝非殺父不汝非殺母不汝非殺阿羅漢不汝非破和合僧不汝不惡心出佛身血不汝非是非人不汝非畜生不汝非有二形不汝字何等和上字誰汝年滿二十不衣鉢具不父母聽汝不汝非負人債不汝非奴不汝非官人不汝是丈夫不丈夫有如是病癩癰疽白癩乾痟癲狂病汝今有此諸病不又須隨事一一答無正授戒法戒法難生衆緣須具以法開導令起上上品心至誠諦受當如是作大德僧聽此某甲從某甲求受具足戒此某甲今從僧乞受具足戒某甲為和上某甲自說清淨無諸難事年滿二十三衣鉢具若僧時到僧忍聽授某甲具足戒某甲為和上白如是大德僧聽此某甲從某甲求受具足戒此某甲今從僧乞受具足戒某甲為和上某甲自說清淨無諸難事年滿二十三衣鉢具僧今授某甲具足戒某甲為和上誰諸長老忍僧與某甲授具足戒某甲為和上者默然誰不忍者說三說僧已忍與某甲授具足戒某甲為和上竟僧忍默然故是事如是持作此法已應為記時邊受與此無異授戒相法時有比丘受具足已僧盡捨去所受戒人本二去彼不遠時受戒者即共行不淨佛言自今已去作羯磨已當先說四波羅夷應作是說善男子聽如來至真等正覺說四波羅夷法若比丘犯一一法非沙門非釋種子汝一切不得犯淫作不淨行若比丘犯不淨行受淫欲法乃至共畜生非沙門非釋種子爾時世尊與說譬喻猶如有人截其頭終不還活比丘亦如是犯波羅夷法已不能還成比丘行汝是中盡形壽不得作能持不答言能一切不得盜下至草葉若比丘盜人五錢若過五錢若自取教人取若自破教人破若自斫教人斫若燒若埋若壞色非沙門非釋種子譬如斷多羅樹心終不復更生長比丘亦如是犯波羅夷法已終不還成比丘行汝是中盡形壽不得作能持不答言能一切不得故斷衆生命下至蟻子若比丘故自手斷人命求刀授與人教死歎死勸死與人非藥若墮胎若禱殺自作方便若教人作非沙門非釋種子譬喻者說言猶如針鼻缺不堪復用比丘亦如是犯波羅夷法已終不還成比丘行汝是中盡形壽不得作能持不答言能一切不得妄語乃至戲笑若比丘不真實非己有自說言我得上人法得禪得解脫得定得四空定得須陀洹果斯陀含果阿那含果阿羅漢果天來龍來鬼神來供養我非沙門非釋種子譬喻者說言猶如大石破為二分終不還合比丘亦如是犯波羅夷法已終不還成比丘行汝是中盡形壽不得作能持不答言能授四依法有一年少外道來求出家諸比丘即與出家先與四依彼外道報言大德我堪受二依乞食樹下坐納衣腐爛藥我不堪此二事何以故誰能自觸己物即便休道不出家佛言此外道不出家大有所失若出家者當得道證自今已去先受戒已後受四依應語云善男子聽如來至真等正覺說四依法比丘依此得出家受具足成比丘法依糞掃衣比丘依此得出家受具足成比丘法汝是中盡形壽能持不答言能若得長利檀越施衣割壞衣得受依乞食比丘依此得出家受具足成比丘法汝是中盡形壽能持不答言能若得長利若僧差食檀越送食月八日食十五日食月初日食若僧常食檀越請食得受依樹下坐比丘依此得出家受具足成比丘法汝是中盡形壽能持不答言能若得長利若別房尖頭屋小房石室兩房一戶得受依腐爛藥比丘依此得出家受具足戒成比