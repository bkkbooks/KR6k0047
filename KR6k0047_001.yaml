言不應遮他覓罪遮說戒遮自恣比丘尼不應呵比丘比丘應呵比丘尼如此法應尊重等如上式叉摩那學戒已從比丘僧乞受大戒如此法應尊重等如上比丘尼犯僧殘罪應二部僧中行摩那埵如此法應尊重等如上比丘尼半月從僧乞教誡如此法應尊重等如上比丘尼不應在無比丘處夏安居如此法應尊重等如上比丘尼僧夏安居竟應往比丘僧中求三事自恣見聞疑如此法應尊重等如上次為說法量機開導略教誡法若無教誡尼人遍請不得此受囑比丘還至上座前具白上座應語彼云此無教誡比丘尼人及無能說法者語比丘尼衆勤修莫放逸明日尼來此比丘傳上座語語告清淨法若十四十五十六日舊比丘欲說戒有客比丘來已說戒竟若少若等應從舊比丘重說戒不者如法治若客多者舊比丘應求客和合若不得者應出界外說戒若舊比丘已說戒竟客比丘來欲說戒若少若等應求舊比丘和合若不得者應出界外說戒若客比丘多應從客比丘重說戒不者如法治若日同時不同舊比丘集已說序竟客比丘來少告清淨作是告云大德僧聽我某甲比丘清淨作是告已餘者當次第聽若說戒竟舉衆未起若多未起若都已起亦告清淨不者如法治若說序竟客來等多舊比丘更為重說戒不者如法治若說戒竟舉衆未起若多未起若都已起亦為重說若客比丘集已說序等舊比丘來亦如是略說戒法律言若有八難及餘緣聽略說戒言八難者若王若賊若火若水若病若人若非人若惡蟲餘緣者若有大衆集床座少若衆多病聽略說戒若大衆集座上覆蓋不周或天雨若布薩多夜已久或鬪諍事或論阿毗曇毗尼或說法夜已久聽一切衆未起明相未出應作羯磨說戒更無方便可得宿受欲清淨略前方便一如廣法量難遠近若說戒序問清淨已難至應言諸大德是四波羅夷法僧常聞乃至衆學亦爾七滅已下依文廣誦若難緣逼近不及說序者即以此緣應去對首說戒法若有三人各各相向作如是言二長老憶念今僧十五日說戒我某甲比丘清淨三說二人亦爾心念說戒法若有一人應心念言今日衆僧十五日說戒我某甲比丘清淨三說增減說戒法律言若有比丘喜鬪罵詈遞相誹謗口出刀劍欲來至此說戒者應作二三布薩若應十五日說十四日作若應十四日說十三日作若聞今日來即應疾疾布薩若聞已入界應至界外說戒若能如是者善若不能應作白却說戒作如是白大德僧聽若僧時到僧忍聽僧今不說戒至黑月十五日當說我白如是若客比丘不去應作第二却白應如是作大德僧聽若僧時到僧忍聽僧今不說戒至白月十五日當說戒白如是若客比丘故不去至白月者舊比丘應如法強與客比丘問答非時和合法若因舉事遂有鬪諍能所不和別部說戒若能懺悔改過從僧乞解解已作白羯磨和合布薩應如是白大德僧聽彼所因事令僧鬪諍誹謗互求長短令僧破令僧別住令僧塵垢彼人僧為舉罪已還為解已滅僧塵垢若僧時到僧忍聽僧作和合布薩白如是作是白已和合布薩非時說戒法若因鬪諍令僧不和令僧別異分為二部若能於中改悔不相發舉此則名為以法和合作如是白大德僧聽衆僧所因諍事令僧鬪諍而不和合衆僧破壞令僧塵垢令僧別異分為二部彼人自知犯罪事今已改悔除滅僧塵垢若僧時到僧忍聽僧今和合說戒白如是作是白已然後和合說戒安居篇第六對首法告諸比丘汝不應一切時春夏冬人間遊行從今已去聽諸比丘三月夏安居應作是言長老一心念我某甲比丘依某甲僧伽藍若在村內應云某甲聚落若在別房應云某甲房前三月夏安居房舍破修治故三說以安居依第五律師故須問言汝依誰持律彼應答言依某甲律師復應語言有疑當問彼復答言可爾後三月安居法亦如是安居有二種一前二後若前安居住前三月若後安居住後三月心念法律言從今日聽諸比丘若無所依人心念安居作法同前但除初句及後問答作其三說忘成法爾時比丘住處欲安居無所依人白忘不心念不知成不佛言若為安居故來便成安居及界法時諸比丘往安居處欲安居入界便明相出彼有疑為成安居不佛言若為安居故來便成安居次入園亦同次一腳入界入園亦如是受日篇第七對首法若有佛法僧事檀越父母等請喚受懺病患看病求同業等緣不及即日還聽受七日去應如是作長老一心念我某甲比丘受七日法出界外為某事故還此中安居白長老令知三說不應專為飲食故去羯磨法為前緣遠不及七日還佛言聽有如是事受過七日法若十五日一月日白二羯磨應如是作大德僧聽若僧時到僧忍聽某甲比丘受過七日法十五日一月日出界外為某事故還此中安居白如是大德僧聽某甲比丘受過七日法十五日一月日出界外為某事故還此中安居誰諸長老忍僧聽某甲比丘受過七日法十五日一月日出界外為某事故還此中安居者默然誰不忍者說僧已忍某甲比丘受過七日法十五日一月日出界外為某事故還此中安居竟僧忍默然故是事如是持自恣篇第八白僧自恣時法自今已去聽安居竟自恣聽遮自恣不應求聽何以故自恣即是聽又諸比丘不知今日自恣明日自恣佛言自今已去聽若小食上中食上上座唱言大德僧聽今僧某月某日某時集某處自恣餘儀軌等並同說戒差受自恣人法諸比丘一時自恣鬧亂又不求次第自恣上座疲極佛言不應爾聽差受自恣人白二羯磨有五法者應差若不愛不恚不怖不癡知自恣未自恣應如是差大德僧聽若僧時到僧忍聽僧差某甲比丘作受自恣人白如是大德僧聽僧差某甲比丘作受自恣人誰諸長老忍僧差某甲比丘作受自恣人者默然誰不忍者說僧已忍差某甲比丘作受自恣人竟僧忍默然故是事如是持自恣白法律言聽比丘坐應知來不先白後自恣作如是白大德僧聽今日衆僧自恣若僧時到僧忍聽僧和合自恣白如是僧自恣法律言聽徐徐三說了了自恣不應反抄衣衣纏頸等應偏露等作如是言大德衆僧今日自恣我某甲比丘亦自恣若見聞疑罪大德長老哀愍故語我我若見罪當如法懺悔三說若病比丘佛聽隨身所安自恣其告清淨緣及告法一同說戒略自恣法律言若有八難及餘緣聽略自恣若難事尚遠容得廣說應廣說若難事近不得三說當再說若不得再說應一說若不者如法治若難事近不得一說者諸比丘即應作白各共三說自恣作如是白大德僧聽若僧時到僧忍聽僧今各各共三語自恣白如是作是白已各共三語自恣再說一說亦如是若難事近不得各三語自恣亦不得白即應以此事去對首自恣法若有四人各各相向作如是言三長老憶念今日衆僧自恣我某甲比丘自恣清淨三說若三人二人亦如是心念自恣法若有一人應心念言今日衆僧自恣我某甲比丘自恣清淨三說增益自恣法律言若有衆多比丘結安居精勤行道得增上果證諸比丘作是念我曹若今日自恣便應移住餘處恐不得如是樂彼比丘即應作白增益自恣作如是白大德僧聽若僧時到僧忍聽僧今日不自恣四月滿當自恣白如是作如是白已至四月滿自恣增減自恣法律言若自恣日聞異住處比丘鬪諍不和欲來此自恣彼比丘應作若二若三減日自恣若聞已入界應為具洗浴器等安置已至界外自恣若能如是方便作者善若不能者彼作白增上自恣作如是白大德僧聽若僧時到僧忍聽僧今日不自恣至黑月十五日當自恣白如是作是白已增上自恣若客比丘住至黑月十五日者舊比丘應作白第二增上自恣作如是白大德僧聽若僧時到僧忍聽僧今日不自恣後白月十五日當自恣白如是若客比丘猶不去舊比丘應如法如律強和合自恣受比丘尼自恣法時比丘僧應為盡集不來者囑授彼比丘尼於僧中說自恣已僧中上座語云大德僧衆不見比丘尼衆有見聞疑罪可舉語比丘尼衆如法自恣謹慎莫放逸使尼禮足已還衣鉢藥受淨篇第九受三衣法依十誦云長老一心念我比丘某甲是衣僧伽梨若干條受若干長若干短割截衣持三說受下二衣類准亦爾捨三衣法應翻受云長老一心念我比丘某甲是衣僧伽梨若干條受若干長若干短割截衣持今捨三說捨下二衣類准亦爾受尼師壇法應云長老一心念我比丘某甲此尼師壇是我助身衣受三說餘助身衣受同此法捨者翻受應知受鉢法律言鉢有二種一瓦二鐵色亦二種一赤二黑大者三升小者一升半此應持應淨施持准十誦云長老一心念我比丘某甲此鉢多羅應量受長用故三說捨者翻受應知受非時藥法律言聽飲八種漿一梨漿二閻浮果漿三酸棗漿四甘蔗漿五微果漿六捨樓迦漿七波樓師漿八蒲萄漿若不醉人應非時飲若醉人不應飲若飲如法治應從淨人手受已次對比丘加法云長老一心念我比丘某甲有某病緣故此某非時漿為經非時服故今於長老邊受三說受餘二藥法同七日應言為共宿七日服故盡形應言為共宿長服故七日藥者酥等盡形藥者一切醎醋等不任為食者真實淨法應云大德一心念我有此長衣未作淨今為淨故捨與大德為真實淨故作真實淨應問施主然後得著鉢藥類同展轉淨法應云大德一心念此是我長衣未作淨為淨故施與大德為展轉淨故彼受淨者應云長老一心念汝有此長衣未作淨為淨故與我我今受之受已語言汝施與誰彼應答言施與某甲受淨者言長老一心念汝是長衣未作淨為淨故施與我我今受之受已汝與某甲是衣某甲已有汝為某甲善護持著用隨因緣作展轉淨若問不問聽隨意著鉢藥類同事別為異攝物篇第十攝時現前施法律言自今已去不應於一切時春夏冬求索夏衣又不應此處安居餘處受夏衣分又有比丘在異住處結夏安居已復於餘處住彼不知何處取安居物佛言聽住日多處取若二處俱等聽各取半又云衆僧得夏安居衣僧破為二部佛言應數人多少分若未得夏衣若得夏衣及未得夏衣僧破二部亦數人分此等為施現前分並無法攝非時現前施法時王舍城諸優婆塞聞佛聽諸比丘畜檀越施衣即遣人大送種種好衣與諸比丘諸比丘不知云何佛言聽分不知云何分當數人多少分若十人為十分乃至百人為百分好惡相參分不應自取分使異人取不應自擲籌使不見者擲籌此既數人亦無分法攝時僧施法時有比丘未分夏衣便去後比丘分夏衣不敢取去者分諸比丘不知成分不佛言成分應相待亦應囑授後人受夏衣分律言若一比丘安居大得僧夏安居衣物彼比丘應作心念言此是我物其羯磨對首法准同非時僧施更無異故不出攝非時僧施差分物人法時有住處現前僧得可分衣物佛言聽分分時有客數來分衣疲極應差一人令分此人應具五法五法如上應如是作大德僧聽若僧時到僧忍聽僧差某甲比丘為僧作分物人白如是大德僧聽僧差某甲比丘為僧作分物人誰諸長老忍僧差某甲比丘為僧作分物人者默然誰不忍者說僧已忍差某甲比丘為僧作分物人竟僧忍默然故是事如是持為僧分粥分小食佉闍尼差請會敷臥具分臥具分浴衣分衣可與可取差比丘使沙彌使一切亦如是有五法為僧分粥入地獄如箭射謂有愛等有五法分粥生天如箭射謂不愛等乃至差沙彌使亦如是付分衣人物法既差人已應須付物作如是付大德僧聽此住處若衣若非衣現前僧應分若僧時到僧忍聽僧今與某甲比丘彼當與僧白如是大德僧聽此住處若衣若非衣現前僧應分僧今與某甲比丘彼當與僧誰諸長老忍此住處若衣若非衣現前僧應分僧與某甲比丘彼當與僧者默然誰不忍者說僧已忍與某甲比丘彼當與僧竟僧忍默然故是事如是持作此法已准人多少等分沙彌若和合等分若不和合二分與一又若不和三分與一又若不與不應分僧伽藍人四分與一若不與不應分四人直攝物法若但四人不成差不成付直作攝法應如是作大德僧聽此住處若衣若非衣現前僧應分若僧時到僧忍聽今現前僧分是衣物白如是大德僧聽此住處若衣若非衣現前僧應分今現前僧分是衣物誰諸長老忍此住處若衣若非衣現前僧應分今現前僧分是衣物者默然誰不忍者說僧已忍今現前僧分是衣物竟僧忍默然故是事如是持作羯磨已分法如前對首攝物法若有三人彼此共三語受應作是言二長老憶念此住處若衣若非衣現前僧應分此處無僧此是我等分三說二人亦爾分法如前心念攝物法若有一人應心念言此住處若衣若非衣現前僧應分此處無僧此是我分三說分法如前攝二部僧得施法爾時有異住處二部僧多得可分衣物時比丘僧多比丘尼僧少佛言應分作二分若無比丘尼純式叉摩那亦分二分及純沙彌尼亦分二分若無沙彌尼僧應分若比丘少比丘尼多亦分二分若無比丘純有沙彌亦分二分若無沙彌比丘尼應分分二分已各至本處作羯磨等三法分之時僧得施亦爾其二部現前施並數人分攝亡比丘物法時諸比丘分僧園田果樹又分別房及屬別房物又分銅瓶銅盆釜鑊及諸重物又分繩床木床坐褥臥褥枕又分伊梨延陀耄羅耄耄羅氍毺又分車輿守僧伽藍人又分水瓶澡罐錫杖扇又分鐵作器木作器陶作器皮作器竹作器佛言不應分屬四方僧氍毺廣三肘長五肘毛長三指剃刀衣鉢坐具針筒盛衣貯器俱夜羅器現前僧應分先作此簡然後作法看病人對僧捨物法時看病人持物僧中具儀捨云大德僧聽某甲比丘此若餘處亡云彼住處命過所有衣鉢坐具針筒盛衣貯器此隨現有六物作法若有闕者應除又若物類衆多此言攝不盡者應言若衣非衣此住處現前僧應分三說賞看病人物法律言僧問瞻病人言病人有囑授不誰負病者物病者負誰物有五法應與看病人物一知病人可食不可食可食能與二不惡賤病人大小便唾吐三有慈愍心不為衣食四能經理湯藥乃至差若死五能為病人說法令病者歡喜已身於善法增益有是五法應取病人衣物其衣鉢等物隨現有者賞無者不得將餘物替應如是賞大德僧聽某甲比丘命過所有衣鉢坐具針筒盛衣貯器此現前僧應分若僧時到僧忍聽僧今與某甲看病比丘白如是大德僧聽某甲比丘命過所有衣鉢坐具針筒盛衣貯器此現前僧應分僧今與某甲看病比丘誰諸長老忍僧與某甲看病比丘衣鉢坐具針筒盛衣貯器者默然誰不忍者說僧已忍與某甲看病比丘衣鉢坐具針筒盛衣貯器竟僧忍默然故是事如是持差分衣人法具德如前應如是差大德僧聽若僧時到僧忍聽僧差某甲比丘為僧作分物人白如是大德僧聽僧差某甲比丘為僧作分物人誰諸長老忍僧差某甲比丘為僧作分物人者默然誰不忍者說僧已忍差某甲比丘為僧作分物人竟僧忍默然故是事如是持付分衣人物法差已應如是付大德僧聽某甲比丘命過所有若衣非衣此現前僧應分若僧時到僧忍聽僧今與某甲比丘某甲比丘當還與僧白如是大德僧聽某甲比丘命過所有若衣非衣此現前僧應分僧今與某甲比丘某甲比丘當還與僧誰諸長老忍某甲比丘命過所有若衣非衣此現前僧應分僧今與某甲比丘某甲比丘當還與僧者默然誰不忍者說僧已忍與某甲比丘某甲比丘當還與僧竟僧忍默然故是事如是持分法如前四人直攝物法以不成差付直分云大德僧聽某甲比丘命過所有若衣非衣此現前僧應分若僧時到僧忍聽今現前僧分是衣物白如是大德僧聽某甲比丘命過所有若衣非衣此現前僧應分今現前僧分是衣物誰諸長老忍某甲比丘命過所有若衣非衣此現前僧應分今現前僧分是衣物者默然誰不忍者說僧已忍今現前僧分是衣物竟僧忍默然故是事如是持作羯磨已分法如前有看病人應口和賞對首攝物法若有三人彼此共三說受作如是言二長老憶念某甲比丘命過所有若衣非衣此現前僧應分此處無僧此是我等分三說二人亦爾分法如前有看病人亦口和賞心念攝物法若有一人應心念言某甲比丘命過所有若衣非衣此現前僧應分此處無僧此是我分三說分法如前無住處攝物法時有比丘遊行到無比丘住村到已命過不知誰應分此衣鉢白佛佛言彼處若有信樂優婆塞若守園人彼應賞録若有五衆出家人前來者應與若無來者應送與近處僧伽藍
